<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | PageAmpHTML</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
        }
        .code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #36adf6, #0c93e7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        p {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: #0c93e7;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: background 0.15s;
        }
        .btn:hover { background: #015da0; }
        .brand {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .brand a { color: #0c93e7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>This subdomain doesn't have any hosted content yet, or the page you're looking for doesn't exist.</p>
        <a href="https://pageamphtml.com" class="btn">
            ← Go to PageAmpHTML
        </a>
        <p class="brand">Powered by <a href="https://pageamphtml.com">PageAmpHTML</a></p>
    </div>
</body>
</html>
