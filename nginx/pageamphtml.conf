# ============================================================
# PageAmpHTML - NGINX Configuration
# Production-ready wildcard subdomain static hosting
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream for Next.js app
upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ============================================================
# HTTP → HTTPS redirect (all traffic)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name *.pageamphtml.com pageamphtml.com;

    # Allow Let's Encrypt / Cloudflare verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# Main domain → Next.js Dashboard
# Handles: pageamphtml.com, www.pageamphtml.com
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pageamphtml.com www.pageamphtml.com;

    # SSL (managed by Cloudflare or Let's Encrypt)
    ssl_certificate /etc/nginx/ssl/pageamphtml.com.crt;
    ssl_certificate_key /etc/nginx/ssl/pageamphtml.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Connection limits
    limit_conn addr 50;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # Client body size (for uploads)
    client_max_body_size 12M;
    client_body_timeout 30s;
    client_header_timeout 15s;

    # Upload API - stricter rate limit
    location /api/pages/upload {
        limit_req zone=upload burst=3 nodelay;
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Auth API - strict rate limit
    location ~ ^/api/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API routes
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # All other routes → Next.js
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ============================================================
# Wildcard subdomain → Static HTML Files
# Handles: *.pageamphtml.com (except main domain)
# NGINX serves files directly - NOT through Next.js
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.pageamphtml.com;

    # SSL (same certificate - must support wildcards)
    ssl_certificate /etc/nginx/ssl/pageamphtml.com.crt;
    ssl_certificate_key /etc/nginx/ssl/pageamphtml.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers for hosted content
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting for static content
    limit_req zone=static burst=50 nodelay;
    limit_conn addr 30;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # No uploads on subdomain sites
    client_max_body_size 1K;

    # Extract subdomain from $host
    # $host = "promo.pageamphtml.com" → $subdomain = "promo"
    set $subdomain "";
    if ($host ~* "^([a-z0-9][a-z0-9-]*[a-z0-9]|[a-z0-9])\.pageamphtml\.com$") {
        set $subdomain $1;
    }

    # Block reserved subdomains
    if ($subdomain = "admin") { return 403; }
    if ($subdomain = "api") { return 403; }
    if ($subdomain = "dashboard") { return 403; }
    if ($subdomain = "www") { return 301 https://pageamphtml.com$request_uri; }

    # Document root based on subdomain
    root /var/www/storage/sites/$subdomain;

    # Default file
    index index.html index.htm;

    # Main location - serve static files
    location / {
        # Try the exact file, then directory with index, then 404
        try_files $uri $uri/ /index.html =404;

        # Static caching headers
        location ~* \.(html|htm)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            add_header X-Content-Type-Options "nosniff" always;
        }

        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|otf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(mp4|webm|ogg|mp3|wav|pdf)$ {
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common attack vectors
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
        root /var/www/storage/error-pages;
    }

    # Custom 403 page
    error_page 403 /403.html;
    location = /403.html {
        internal;
        root /var/www/storage/error-pages;
    }

    # Logging
    access_log /var/log/nginx/subdomains.access.log;
    error_log /var/log/nginx/subdomains.error.log;
}
